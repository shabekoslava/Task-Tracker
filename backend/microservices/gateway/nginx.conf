resolver 127.0.0.11 valid=5s ipv6=off;

server {
    listen 80;

    # 1. Сервис Аутентификации и Пользователей (auth-service)
    location /api/auth {
        set $auth_upstream http://auth-service:8000;
        proxy_pass $auth_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/user {
        set $auth_upstream http://auth-service:8000;
        proxy_pass $auth_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. WebSocket и Чат Сервис (chat-service)
    location /ws {
        set $chat_upstream http://chat-service:8000;
        proxy_pass $chat_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Сервис Проектов и Доски (board-service) - по умолчанию для остальных роутов
    location /api {
        set $board_upstream http://board-service:8000;
        proxy_pass $board_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
